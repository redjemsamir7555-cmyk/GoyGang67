<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOYGANG67 // ULTRA-FUTURE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --main-grad: linear-gradient(135deg, #0072ff 0%, #00c6ff 100%);
            --glass: rgba(255, 255, 255, 0.15);
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://web.archive.org/web/20150311225501im_/http://windows.microsoft.com/en-us/windows-8/desktop-backgrounds-main-v2/desktop-backgrounds-main-v2-wallpaper-1.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden; transition: 0.5s;
        }

        /* Effet Frutiger Aero / Glossy */
        .glass-panel {
            backdrop-filter: blur(15px);
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            border-radius: 20px;
        }

        .main-layout {
            display: grid; grid-template-columns: 250px 1fr; height: 100vh; gap: 10px; padding: 10px; box-sizing: border-box;
        }

        /* Sidebar Social */
        .sidebar { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar h2 { color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5); font-style: italic; }

        /* Chat */
        .chat-container { display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #chat-win { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        .msg {
            padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.1);
            border-bottom: 3px solid rgba(255,255,255,0.2); animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; max-width: 80%;
        }
        .msg img { max-width: 100%; border-radius: 10px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* Inputs Futuristes */
        .input-area { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        input, button { 
            padding: 12px; border-radius: 50px; border: none; outline: none; 
            background: rgba(255,255,255,0.2); color: white; font-weight: bold;
        }
        input::placeholder { color: rgba(255,255,255,0.7); }
        .btn-send { background: var(--main-grad); cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-send:hover { transform: scale(1.02); box-shadow: 0 0 20px #00c6ff; }

        /* Jumpscare Screen */
        #jumpscare-overlay {
            position: fixed; top:0; left:0; width: 100vw; height: 100vh; z-index: 9999;
            display: none; background: black;
        }
        .flash { animation: invert-flash 0.1s infinite; }
        @keyframes invert-flash { 0% { filter: invert(0); } 50% { filter: invert(1); } 100% { filter: invert(0); } }

        @keyframes pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="jumpscare-overlay"></div>

<div class="main-layout">
    <!-- Sidebar -->
    <div class="sidebar glass-panel">
        <h2>GOY SOCIAL</h2>
        <button onclick="changeBg()">CHANGER FOND</button>
        <hr style="width:100%; opacity:0.2;">
        <button style="background:rgba(255,0,0,0.5)" onclick="adminDeleteAll()">TOUT SUPPRIMER</button>
        <button style="background:black; color:red;" onclick="triggerJumpscare()">⚠️ JUMPSCARE ALL</button>
        <p style="font-size: 10px; margin-top: auto; color: white;">Vibe: Frutiger Aero / Future 2010</p>
    </div>

    <!-- Main Chat -->
    <div class="chat-container glass-panel">
        <div id="chat-win"></div>
        
        <div class="input-area">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="user" placeholder="Ton nom..." style="width: 20%;">
                <input type="text" id="msg-input" placeholder="Message futuriste..." style="flex: 1;">
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="file" id="files" multiple style="font-size: 10px;">
                <input type="color" id="color" value="#00ffcc">
                <button class="btn-send" onclick="sendAll()">ENVOYER</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION (METS LA VRAIE CLÉ ICI) ---
    const S_URL = 'https://cqxelnijwtjdnczpaggs.supabase.co';
    const S_KEY = 'TA_VRAIE_CLE_QUI_COMMENCE_PAR_eyJ'; 
    const sb = supabase.createClient(S_URL, S_KEY);

    let lastJumpscareId = null;

    async function fetchEverything() {
        const { data, error } = await sb.from('messages').select('*').order('created_at', { ascending: true });
        if (error) return;

        const win = document.getElementById('chat-win');
        win.innerHTML = '';
        
        data.forEach(m => {
            // Logique Jumpscare Global
            if (m.type === 'jumpscare' && m.id !== lastJumpscareId) {
                doJumpscare();
                lastJumpscareId = m.id;
            }

            if (m.type === 'text') {
                const isImg = m.content.includes('supabase.co/storage');
                win.innerHTML += `
                    <div class="msg" style="border-left: 5px solid ${m.color}">
                        <b style="color: ${m.color}">${m.username}</b>
                        <div style="color: white; margin-top:5px;">
                            ${isImg ? `<img src="${m.content}">` : m.content}
                        </div>
                    </div>
                `;
            }
        });
        win.scrollTop = win.scrollHeight;
    }

    async function sendAll() {
        const u = document.getElementById('user').value || 'User';
        const t = document.getElementById('msg-input').value;
        const c = document.getElementById('color').value;
        const fileList = document.getElementById('files').files;

        // Si y'a du texte
        if (t) {
            await sb.from('messages').insert([{ username: u, content: t, color: c, type: 'text' }]);
        }

        // Si y'a des fichiers (Multi-upload)
        if (fileList.length > 0) {
            for (let file of fileList) {
                const path = `${Date.now()}_${file.name}`;
                const { data } = await sb.storage.from('fichiers').upload(path, file);
                if (data) {
                    const url = `${S_URL}/storage/v1/object/public/fichiers/${path}`;
                    await sb.from('messages').insert([{ username: u, content: url, color: c, type: 'text' }]);
                }
            }
        }
        
        document.getElementById('msg-input').value = '';
        document.getElementById('files').value = '';
        fetchEverything();
    }

    // Fonction Jumpscare
    async function triggerJumpscare() {
        await sb.from('messages').insert([{ username: 'SYSTEM', content: 'JUMPSCARE', type: 'jumpscare' }]);
    }

    function doJumpscare() {
        const overlay = document.getElementById('jumpscare-overlay');
        const imgs = [
            'https://media.tenor.com/r9GmMxwqtwgAAAAe/jeff-the-killer-that-face.png',
            'https://www.shutterstock.com/image-vector/bold-yellow-numbers-67-white-600w-2697852337.jpg',
            'https://i.ytimg.com/vi/1m1LVq0ktQE/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLBvIKt8OlTEldpCRVnN8jSkajSXMw'
        ];
        let count = 0;
        overlay.style.display = 'block';
        overlay.classList.add('flash');
        
        const interval = setInterval(() => {
            overlay.innerHTML = `<img src="${imgs[count % 3]}" style="width:100%; height:100%; object-fit:cover;">`;
            count++;
            if (count > 20) {
                clearInterval(interval);
                overlay.style.display = 'none';
                overlay.classList.remove('flash');
            }
        }, 100);
    }

    function changeBg() {
        const link = prompt("Lien direct de l'image :");
        if (link) document.body.style.backgroundImage = `url('${link}')`;
    }

    async function adminDeleteAll() {
        if(confirm("Supprimer TOUT l'historique ?")) {
            await sb.from('messages').delete().neq('id', 0);
            fetchEverything();
        }
    }

    setInterval(fetchEverything, 3000);
    fetchEverything();
</script>

</body>
</html>
