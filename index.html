<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoyGang67 - Private Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0a; --panel: rgba(20, 20, 20, 0.8); --text: #00ff41; --primary: #00ff41; --accent: #ff003c;
        }
        .light-mode {
            --bg: #f0f0f0; --panel: rgba(255, 255, 255, 0.9); --text: #222; --primary: #3b82f6; --accent: #ef4444;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Courier New', Courier, monospace; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Background Hacker Canvas */
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.15; }

        .main-container { display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; border-left: 1px solid var(--primary); border-right: 1px solid var(--primary); background: var(--panel); backdrop-filter: blur(10px); }

        /* Header */
        header { padding: 15px; border-bottom: 1px solid var(--primary); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); }
        .btn-theme { cursor: pointer; border: 1px solid var(--primary); background: none; color: var(--primary); padding: 5px 10px; border-radius: 5px; }

        /* Chat Area */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: thin; scrollbar-color: var(--primary) transparent; }
        .message { padding: 10px; border-radius: 8px; border-left: 4px solid; background: rgba(255,255,255,0.05); position: relative; animation: fadeIn 0.3s ease; }
        .message b { font-size: 0.9em; opacity: 0.8; }
        .message img { max-width: 200px; border-radius: 5px; margin-top: 10px; display: block; border: 1px solid var(--primary); }
        .controls { position: absolute; top: 5px; right: 5px; display: none; }
        .message:hover .controls { display: block; }
        .controls button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; }

        /* Input Area */
        .input-bar { padding: 20px; border-top: 1px solid var(--primary); background: rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 10px; }
        .row { display: flex; gap: 10px; }
        input, select, button { background: rgba(0,0,0,0.5); border: 1px solid var(--primary); color: var(--text); padding: 10px; border-radius: 4px; }
        input:focus { outline: 1px solid white; }
        .btn-send { background: var(--primary); color: black; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-send:hover { opacity: 0.8; box-shadow: 0 0 10px var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="main-container">
    <header>
        <div style="font-weight: bold; letter-spacing: 2px;">GOYGANG67 // TERMINAL</div>
        <button class="btn-theme" onclick="toggleTheme()">DARK/LIGHT</button>
    </header>

    <div id="chat-window">
        <!-- Les messages arrivent ici -->
    </div>

    <div class="input-bar">
        <div class="row">
            <input type="text" id="username" placeholder="Pseudo" style="width: 30%;">
            <input type="color" id="msg-color" value="#00ff41" title="Couleur de ton texte" style="width: 50px; padding: 2px;">
            <input type="file" id="img-input" accept="image/*" style="font-size: 0.8em; flex: 1;">
        </div>
        <div class="row">
            <input type="text" id="message" placeholder="Entrer une commande ou un message..." style="flex: 2;">
            <button class="btn-send" onclick="sendAll()">ENVOYER</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION (METS TES INFOS ICI) ---
    const SUPABASE_URL = 'https://ton-projet.supabase.co'; 
    const SUPABASE_KEY = 'ta-cle-anon-ici';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- EFFET MATRIX ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px arial";
        drops.forEach((y, i) => {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 50);

    // --- THEME ---
    function toggleTheme() { document.body.classList.toggle('light-mode'); }

    // --- LOGIQUE SUPABASE ---
    async function fetchMessages() {
        const { data, error } = await supabase.from('messages').select('*').order('created_at', { ascending: true });
        if (error) return;

        const win = document.getElementById('chat-window');
        win.innerHTML = '';
        data.forEach(m => {
            const isImage = m.content.startsWith('http') && (m.content.match(/\.(jpeg|jpg|gif|png)$/) != null);
            win.innerHTML += `
                <div class="message" style="border-color: ${m.color || 'var(--primary)'}">
                    <div class="controls">
                        <button onclick="editMsg('${m.id}')">EDIT</button>
                        <button onclick="deleteMsg('${m.id}')">DEL</button>
                    </div>
                    <b>${m.username}</b> <span style="font-size: 10px; opacity:0.5;">${new Date(m.created_at).toLocaleTimeString()}</span><br>
                    <div style="color: ${m.color || 'inherit'}">
                        ${isImage ? `<img src="${m.content}">` : m.content}
                    </div>
                </div>
            `;
        });
        win.scrollTop = win.scrollHeight;
    }

    async function sendAll() {
        const user = document.getElementById('username').value || 'Anonyme';
        const text = document.getElementById('message').value;
        const color = document.getElementById('msg-color').value;
        const file = document.getElementById('img-input').files[0];

        if (!text && !file) return;

        let finalContent = text;

        // Si y'a une image
        if (file) {
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await supabase.storage.from('fichiers').upload(fileName, file);
            if (data) {
                finalContent = `${SUPABASE_URL}/storage/v1/object/public/fichiers/${fileName}`;
            }
        }

        await supabase.from('messages').insert([{ username: user, content: finalContent, color: color }]);
        document.getElementById('message').value = '';
        document.getElementById('img-input').value = '';
        fetchMessages();
    }

    async function deleteMsg(id) {
        if(confirm("Supprimer pour tout le monde ?")) {
            await supabase.from('messages').delete().eq('id', id);
            fetchMessages();
        }
    }

    async function editMsg(id) {
        const newText = prompt("Nouveau message :");
        if (newText) {
            await supabase.from('messages').update({ content: newText }).eq('id', id);
            fetchMessages();
        }
    }

    // Init
    setInterval(fetchMessages, 3000);
    fetchMessages();
</script>

</body>
</html>
